set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
# Forward modified keys (Shift+Enter, etc.) to apps like Claude Code instead of
# normalizing them to plain Enter. Without this tmux eats the Shift modifier.
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'
set -ga terminal-overrides '*:Ss=\E[%p1%d q:Se=\E[ q'
set-environment -g COLORTERM "truecolor"
 

# list all best plugins
# set -g @plugin 'tmux-plugins/tmux-resurrect'



set -g @plugin 'dracula/tmux'
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# `custom:` runs a script (relative to dracula's scripts/ dir) and shows its output
# as a right-side segment; ../../../keys.sh points at ~/.config/tmux/keys.sh.
set -g @dracula-plugins "custom:../../../keys.sh git cpu-usage ram-usage"
set -g @dracula-custom-plugin-colors "gray white"
# Left segment shows "<hostname>:<session>" so remote machines are identifiable.
set -g @dracula-show-left-icon "#h:#S"
set-option -g renumber-windows on


bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# Linux only
set -g mouse on
set -g set-clipboard on
bind -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if -Ft= '#{pane_in_mode}' 'send-keys -M' 'select-pane -t=; copy-mode -e; send-keys -M'"
bind -n WheelDownPane select-pane -t= \; send-keys -M
bind -n C-WheelUpPane select-pane -t= \; copy-mode -e \; send-keys -M
# Smooth scrolling: scroll a few lines per wheel notch instead of the default 5-line jump
bind -T copy-mode-vi WheelUpPane   send-keys -X -N 3 scroll-up
bind -T copy-mode-vi WheelDownPane send-keys -X -N 3 scroll-down
bind -T copy-mode-vi    C-WheelUpPane   send-keys -X halfpage-up
bind -T copy-mode-vi    C-WheelDownPane send-keys -X halfpage-down
bind -T copy-mode-emacs C-WheelUpPane   send-keys -X halfpage-up
bind -T copy-mode-emacs C-WheelDownPane send-keys -X halfpage-down
# To copy, left click and drag to highlight text in yellow, 
# once you release left click yellow text will disappear and will automatically be available in clibboard
# # Use vim keybindings in copy mode
setw -g mode-keys vi
# Update default binding of `Enter` to also use copy-pipe
unbind -T copy-mode-vi Enter
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "xclip -selection c"
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "xclip -in -selection clipboard"
# bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
# bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"


# vim-like pane resizing  
bind -r C-k resize-pane -U
bind -r C-j resize-pane -D
bind -r C-h resize-pane -L
bind -r C-l resize-pane -R

# vim-like pane switching
bind -r k select-pane -U 
bind -r j select-pane -D 
bind -r h select-pane -L 
bind -r l select-pane -R 

# Single-line status; shortcut hints are a dracula custom segment (see @dracula-plugins).
set -g status on

# and now unbind keys
unbind Up
unbind Down   
unbind Left   
unbind Right  

unbind C-Up   
unbind C-Down 
unbind C-Left 
unbind C-Right

# TPM must be the last line; it sources dracula via the @plugin declaration above.
run -b '~/.config/tmux/plugins/tpm/tpm'
